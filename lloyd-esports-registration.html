<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lloyd E-Sports Championship</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#020617,#0f172a);
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
}

.hero h1 {
  font-family:'Orbitron';
  font-size:60px;
  background:linear-gradient(90deg,#00f5ff,#ff6a00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {
  color:#94a3b8;
}

/* BUTTON */
.btn {
  background:linear-gradient(90deg,#ff6a00,#ffd700);
  border:none;
  padding:14px 30px;
  color:black;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
  margin-top:20px;
}

/* CARD */
.section {
  padding:40px 20px;
  max-width:1000px;
  margin:auto;
}

.card {
  background:#0f172a;
  padding:25px;
  border-radius:10px;
  margin-top:20px;
  border:1px solid #1e293b;
}

/* FORM */
input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:none;
}

button {
  width:100%;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:600px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>LLOYD E-SPORTS</h1>
  <h2>CHAMPIONSHIP 2026</h2>
  <p>1st & 2nd April | UG Management Department</p>

  <button class="btn" onclick="scrollToForm()">Register Now</button>
</div>

<!-- GAMES -->
<div class="section">
  <div class="card">
    <h2>🎮 Games</h2>
    <p>BGMI (Squad) | Free Fire (Solo + Squad)</p>
  </div>
</div>

<!-- REGISTRATION -->
<div class="section" id="form">
  <div class="card">
    <h2>📝 Registration Form</h2>

    <form id="formData">

      <div class="grid">
        <input type="text" placeholder="Full Name" required>
        <input type="tel" placeholder="Mobile Number" required>
      </div>

      <input type="email" placeholder="Email" required>

      <select required>
        <option value="">Select Game</option>
        <option>BGMI (Squad)</option>
        <option>Free Fire (Solo)</option>
        <option>Free Fire (Squad)</option>
      </select>

      <input type="text" placeholder="Team Name (Optional)">

      <button class="btn">Submit Registration</button>

    </form>
  </div>
</div>

<!-- PAYMENT -->
<div class="section">
  <div class="card">
    <h2>💳 Payment</h2>
    <p>Entry Fee: ₹50 per player</p>
    <p>Scan QR to Pay</p>
  </div>
</div>

<script>
function scrollToForm(){
  document.getElementById("form").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
